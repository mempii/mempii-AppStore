name: affine
services:
  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine_server
    ports:
      - '3010:3010'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    volumes:
      - /DATA/AppData/affine/storage:/root/.affine/storage
      - /DATA/AppData/affine/config:/root/.affine/config
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://affine:changethis@postgres:5432/affine
      - AFFINE_INDEXER_ENABLED=false
    restart: unless-stopped
  affine_migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine_migration_job
    volumes:
      - /DATA/AppData/affine/storage:/root/.affine/storage
      - /DATA/AppData/affine/config:/root/.affine/config
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://affine:changethis@postgres:5432/affine
      - AFFINE_INDEXER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  redis:
    image: redis:7.4.9
    container_name: affine_redis
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  postgres:
    image: pgvector/pgvector:pg16
    container_name: affine_postgres
    volumes:
      - /DATA/AppData/affine/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: affine
      POSTGRES_INITDB_ARGS: '--data-checksums'
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-U', "affine", '-d', "affine"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
x-casaos:
  id: org.mempii.affine
  architectures:
    - amd64
    - arm64
  main: affine
  author: mempii
  category: Productivity
  description:
    en_US: Notion alternative.
  developer: AFFiNE
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/affine.svg
  tips: {Change postgres password}
  port_map: "3010"
  update_at: "2026-07-14"
  repo: https://github.com/toeverything/affine
